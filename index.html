document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv ref=\"{{ rootRef }}\" style=\"--vx-accent:#b0542c;--vx-accent-deep:#8c4022;--vx-accent-fill:rgba(176,84,44,0.13);min-height:100vh;background:#f4efe5;color:#2a2620;font-family:'Public Sans',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased\">\n\n  <!-- DESIGN PREVIEW SWITCHER -->\n  <div style=\"position:sticky;top:0;z-index:60;background:#23201b;border-bottom:1px solid #3a352d\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:9px 32px;display:flex;align-items:center;gap:16px\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#7d7361\">Volo Index<\u002Fspan>\n      <div style=\"display:flex;gap:4px;margin-left:auto;flex-wrap:wrap\">\n        <sc-for list=\"{{ screens }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ s.go }}\" style=\"{{ s.tabStyle }}\">{{ s.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PRODUCT NAV -->\n  <header style=\"background:rgba(244,239,229,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #e3d9c9\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:18px 32px;display:flex;align-items:center;gap:32px\">\n      <button onclick=\"{{ go.home }}\" style=\"display:flex;align-items:center;gap:11px;background:none;border:none;cursor:pointer;padding:0;flex:none\">\n        <svg width=\"30\" height=\"26\" viewBox=\"0 0 30 26\" style=\"display:block;flex:none\" fill=\"none\">\n          <path d=\"M2 21 A13 13 0 0 1 28 21\" stroke=\"#e0d4c0\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M6.5 21 A8.5 8.5 0 0 1 23.5 21\" stroke=\"#cd8a4f\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M11 21 A4 4 0 0 1 19 21\" stroke=\"#b0542c\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n          <circle cx=\"15\" cy=\"21\" r=\"2.2\" fill=\"#b0542c\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span style=\"font-family:Spectral,serif;font-weight:600;font-size:21px;letter-spacing:-0.01em;color:#2a2620;white-space:nowrap\">Volo Index<\u002Fspan>\n      <\u002Fbutton>\n      <nav style=\"display:flex;gap:26px;margin-left:8px\">\n        <button onclick=\"{{ go.home }}\" style=\"font-family:'Public Sans';font-size:14.5px;color:#6f665a;background:none;border:none;cursor:pointer;padding:0\" style-hover=\"color:#2a2620\">How it works<\u002Fbutton>\n        <button onclick=\"{{ go.home }}\" style=\"font-family:'Public Sans';font-size:14.5px;color:#6f665a;background:none;border:none;cursor:pointer;padding:0\" style-hover=\"color:#2a2620\">The framework<\u002Fbutton>\n        <button onclick=\"{{ go.leaderboard }}\" style=\"font-family:'Public Sans';font-size:14.5px;color:#6f665a;background:none;border:none;cursor:pointer;padding:0\" style-hover=\"color:#2a2620\">Leaderboard<\u002Fbutton>\n        <button onclick=\"{{ go.pricing }}\" style=\"font-family:'Public Sans';font-size:14.5px;color:#6f665a;background:none;border:none;cursor:pointer;padding:0\" style-hover=\"color:#2a2620\">Pricing<\u002Fbutton>\n      <\u002Fnav>\n      <div style=\"margin-left:auto;display:flex;align-items:center;gap:18px\">\n        <button onclick=\"{{ go.results }}\" style=\"font-family:'Public Sans';font-size:14.5px;color:#6f665a;background:none;border:none;cursor:pointer;padding:0\" style-hover=\"color:#2a2620\">View sample profile<\u002Fbutton>\n        <button onclick=\"{{ go.assessment }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:14.5px;color:#f7f2e9;background:var(--vx-accent,#b0542c);border:none;padding:11px 20px;border-radius:2px;cursor:pointer\" style-hover=\"background:var(--vx-accent-deep,#8c4022)\">Start assessment<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============================ HOME ============================ -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n\n    <!-- HERO -->\n    <section style=\"position:relative;overflow:hidden;border-bottom:1px solid #e3d9c9\">\n      <svg viewBox=\"0 0 600 600\" style=\"position:absolute;right:-120px;top:-80px;width:620px;height:620px;opacity:0.5;pointer-events:none\">\n        <circle cx=\"300\" cy=\"300\" r=\"80\" fill=\"none\" stroke=\"#e3d9c9\" stroke-width=\"1\"><\u002Fcircle>\n        <circle cx=\"300\" cy=\"300\" r=\"140\" fill=\"none\" stroke=\"#e3d9c9\" stroke-width=\"1\"><\u002Fcircle>\n        <circle cx=\"300\" cy=\"300\" r=\"200\" fill=\"none\" stroke=\"#e3d9c9\" stroke-width=\"1\"><\u002Fcircle>\n        <circle cx=\"300\" cy=\"300\" r=\"260\" fill=\"none\" stroke=\"#e3d9c9\" stroke-width=\"1\"><\u002Fcircle>\n      <\u002Fsvg>\n      <div style=\"position:relative;max-width:1200px;margin:0 auto;padding:84px 32px 76px;display:grid;grid-template-columns:1.15fr 0.85fr;gap:64px;align-items:center\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:22px\">A competency index for volunteer leadership<\u002Fdiv>\n\n          <sc-if value=\"{{ heroIsIndividual }}\" hint-placeholder-val=\"{{ true }}\">\n            <h1 style=\"font-family:Spectral,serif;font-weight:600;font-size:58px;line-height:1.04;letter-spacing:-0.018em;color:#22201b;margin:0 0 24px\">Finally, a real <span style=\"font-style:italic;color:var(--vx-accent,#b0542c)\">measure<\u002Fspan> of volunteer leadership.<\u002Fh1>\n            <p style=\"font-family:'Public Sans';font-size:18.5px;line-height:1.62;color:#615950;margin:0 0 36px;max-width:520px\">Volo Index scores how you actually lead volunteers across six research-anchored dimensions — then hands you a development plan built from your real gaps, not a generic curriculum.<\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ heroIsOrg }}\" hint-placeholder-val=\"{{ false }}\">\n            <h1 style=\"font-family:Spectral,serif;font-weight:600;font-size:58px;line-height:1.04;letter-spacing:-0.018em;color:#22201b;margin:0 0 24px\">Know who can actually <span style=\"font-style:italic;color:var(--vx-accent,#b0542c)\">run<\u002Fspan> your volunteer program.<\u002Fh1>\n            <p style=\"font-family:'Public Sans';font-size:18.5px;line-height:1.62;color:#615950;margin:0 0 36px;max-width:520px\">Volo Index measures volunteer-management competency across six research-anchored dimensions — so you can see your team's real strengths, place the right people in the right roles, and invest where it counts.<\u002Fp>\n          <\u002Fsc-if>\n\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n            <button onclick=\"{{ go.assessment }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:15.5px;color:#f7f2e9;background:var(--vx-accent,#b0542c);border:none;padding:15px 28px;border-radius:2px;cursor:pointer\" style-hover=\"background:var(--vx-accent-deep,#8c4022)\">Get your fluency score<\u002Fbutton>\n            <button onclick=\"{{ go.results }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:15.5px;color:#2a2620;background:transparent;border:1px solid #cdc2af;padding:15px 28px;border-radius:2px;cursor:pointer\" style-hover=\"border-color:#2a2620\">See a sample profile<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"margin-top:26px;font-family:'Public Sans';font-size:13.5px;color:#8a7f6d\">No multiple choice. No completion badge. A score you can actually defend.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- HERO PROFILE CARD -->\n        <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:6px;box-shadow:0 24px 60px -32px rgba(60,40,20,0.32);padding:26px 26px 22px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#9c9079\">Volo Index · Certified<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9c9079\">2026<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:2px\">\n            <div style=\"font-family:Spectral,serif;font-weight:600;font-size:64px;line-height:1;color:#22201b\">6.1<\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Public Sans';font-weight:600;font-size:15px;color:var(--vx-accent,#b0542c)\">Proficient<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9c9079\">overall · of 10<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <svg viewBox=\"0 0 380 380\" width=\"100%\" style=\"display:block;margin:4px 0\">\n            <sc-for list=\"{{ radar.rings }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <polygon points=\"{{ r.pts }}\" fill=\"none\" stroke=\"#e8dfce\" stroke-width=\"1\"><\u002Fpolygon>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ radar.axes }}\" as=\"a\" hint-placeholder-count=\"6\">\n              <line x1=\"190\" y1=\"190\" x2=\"{{ a.x }}\" y2=\"{{ a.y }}\" stroke=\"#e8dfce\" stroke-width=\"1\"><\u002Fline>\n            <\u002Fsc-for>\n            <polygon points=\"{{ radar.valuePts }}\" fill=\"var(--vx-accent-fill,rgba(176,84,44,0.13))\" stroke=\"var(--vx-accent,#b0542c)\" stroke-width=\"2\"><\u002Fpolygon>\n            <sc-for list=\"{{ radar.valueDots }}\" as=\"d\" hint-placeholder-count=\"6\">\n              <circle cx=\"{{ d.x }}\" cy=\"{{ d.y }}\" r=\"3.4\" fill=\"var(--vx-accent,#b0542c)\"><\u002Fcircle>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid #ece3d4\">\n            <div style=\"font-family:Spectral,serif;font-style:italic;font-size:15px;color:#2a2620\">Jordan Avery<\u002Fdiv>\n            <div style=\"font-family:'Public Sans';font-size:12.5px;color:#8a7f6d\">Volunteer Coordinator<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STAT STRIP -->\n      <div style=\"border-top:1px solid #e3d9c9;background:rgba(252,250,245,0.5)\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:repeat(4,1fr)\">\n          <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div style=\"padding:24px 24px 24px 0;border-left:1px solid #e3d9c9;padding-left:24px\">\n              <div style=\"font-family:Spectral,serif;font-weight:600;font-size:30px;color:var(--vx-accent,#b0542c);line-height:1\">{{ st.v }}<\u002Fdiv>\n              <div style=\"font-family:'Public Sans';font-size:13.5px;color:#6f665a;margin-top:6px\">{{ st.l }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- POSITIONING / CREDIBILITY -->\n    <section style=\"background:#22201b;color:#ede4d3;border-bottom:1px solid #3a352d\">\n      <div style=\"max-width:1000px;margin:0 auto;padding:72px 32px;text-align:center\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#b5876a;margin-bottom:22px\">Why it exists<\u002Fdiv>\n        <p style=\"font-family:Spectral,serif;font-weight:500;font-size:30px;line-height:1.4;letter-spacing:-0.01em;margin:0;color:#f3ead9\">\"Volunteer leadership\" has never had an honest measure. Most credentials are completion certificates. Volo Index is an evaluation — <span style=\"color:var(--vx-accent,#b0542c);font-style:italic\">grounded in two decades of sector practice, not borrowed frameworks.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- HOW IT WORKS -->\n    <section style=\"border-bottom:1px solid #e3d9c9\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:88px 32px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:16px\">How it works<\u002Fdiv>\n        <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-0.012em;color:#22201b;margin:0 0 8px;max-width:620px\">Three steps from \"I think I'm pretty good\" to a number you can stand behind.<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e3d9c9;border:1px solid #e3d9c9;border-radius:6px;overflow:hidden;margin-top:48px\">\n          <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"3\">\n            <div style=\"background:#faf6ee;padding:34px 30px 38px\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--vx-accent,#b0542c);margin-bottom:20px\">{{ step.n }}<\u002Fdiv>\n              <h3 style=\"font-family:Spectral,serif;font-weight:600;font-size:23px;line-height:1.22;color:#2a2620;margin:0 0 12px\">{{ step.title }}<\u002Fh3>\n              <p style=\"font-family:'Public Sans';font-size:15px;line-height:1.6;color:#6f665a;margin:0\">{{ step.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SIX DIMENSIONS -->\n    <section style=\"background:#efe7d8;border-bottom:1px solid #e3d9c9\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:88px 32px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:32px;flex-wrap:wrap;margin-bottom:46px\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:16px\">The framework<\u002Fdiv>\n            <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-0.012em;color:#22201b;margin:0;max-width:560px\">Six dimensions of volunteer-management competency.<\u002Fh2>\n          <\u002Fdiv>\n          <p style=\"font-family:'Public Sans';font-size:15px;line-height:1.6;color:#6f665a;margin:0;max-width:340px\">Each dimension is anchored in the research literature before a single assessment question is written.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n          <sc-for list=\"{{ dims }}\" as=\"dim\" hint-placeholder-count=\"6\">\n            <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:6px;padding:28px 26px 30px\" style-hover=\"border-color:var(--vx-accent,#b0542c)\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--vx-accent,#b0542c)\">{{ dim.n }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#a89a83\">{{ dim.short }}<\u002Fdiv>\n              <\u002Fdiv>\n              <h3 style=\"font-family:Spectral,serif;font-weight:600;font-size:20px;line-height:1.24;color:#2a2620;margin:0 0 12px\">{{ dim.title }}<\u002Fh3>\n              <p style=\"font-family:'Public Sans';font-size:14px;line-height:1.58;color:#6f665a;margin:0\">{{ dim.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCORING SCALE -->\n    <section style=\"border-bottom:1px solid #e3d9c9\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:88px 32px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:16px\">The scale<\u002Fdiv>\n        <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-0.012em;color:#22201b;margin:0 0 10px;max-width:620px\">Four developmental tiers, deliberately hard to top.<\u002Fh2>\n        <p style=\"font-family:'Public Sans';font-size:16px;line-height:1.6;color:#6f665a;margin:0 0 44px;max-width:560px\">Most people land in the middle — and that is exactly the point. The middle is where a development plan has something real to work with.<\u002Fp>\n\n        <div style=\"display:flex;border-radius:4px;overflow:hidden;margin-bottom:14px;height:14px\">\n          <sc-for list=\"{{ tierScale }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <div style=\"flex:1;background:{{ t.color }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n          <sc-for list=\"{{ tierScale }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <div style=\"padding-top:6px\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\">\n                <span style=\"width:11px;height:11px;border-radius:2px;background:{{ t.color }};flex:none\"><\u002Fspan>\n                <span style=\"font-family:'Public Sans';font-weight:600;font-size:16px;color:#2a2620\">{{ t.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9c9079;margin-bottom:10px\">{{ t.range }}<\u002Fdiv>\n              <p style=\"font-family:'Public Sans';font-size:13.5px;line-height:1.55;color:#6f665a;margin:0\">{{ t.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHO IT'S FOR -->\n    <section style=\"background:#efe7d8;border-bottom:1px solid #e3d9c9\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:88px 32px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:16px\">Who it's for<\u002Fdiv>\n        <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-0.012em;color:#22201b;margin:0 0 46px;max-width:620px\">From the frontline to the executive director.<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n          <sc-for list=\"{{ audience }}\" as=\"a\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:6px;padding:26px 24px;border-top:3px solid var(--vx-accent,#b0542c)\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:12px\">{{ a.tier }}<\u002Fdiv>\n              <h3 style=\"font-family:Spectral,serif;font-weight:600;font-size:19px;line-height:1.25;color:#2a2620;margin:0 0 10px\">{{ a.who }}<\u002Fh3>\n              <p style=\"font-family:'Public Sans';font-size:13.5px;line-height:1.55;color:#6f665a;margin:0\">{{ a.focus }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CTA -->\n    <section style=\"background:#22201b;color:#ede4d3\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:80px 32px;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap\">\n        <div style=\"max-width:560px\">\n          <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:38px;line-height:1.12;letter-spacing:-0.012em;color:#f3ead9;margin:0 0 12px\">Find out where you actually stand.<\u002Fh2>\n          <p style=\"font-family:'Public Sans';font-size:16px;line-height:1.6;color:#bdb29d;margin:0\">One credit unlocks the full evaluation, your six-dimension score, and a development plan built from your gaps.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n          <button onclick=\"{{ go.assessment }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:15.5px;color:#f7f2e9;background:var(--vx-accent,#b0542c);border:none;padding:15px 28px;border-radius:2px;cursor:pointer\" style-hover=\"background:var(--vx-accent-deep,#8c4022)\">Start your assessment<\u002Fbutton>\n          <button onclick=\"{{ go.pricing }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:15.5px;color:#ede4d3;background:transparent;border:1px solid #4a4339;padding:15px 28px;border-radius:2px;cursor:pointer\" style-hover=\"border-color:#ede4d3\">See pricing<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============================ ASSESSMENT ============================ -->\n  <sc-if value=\"{{ isAssessment }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <div style=\"max-width:1200px;margin:0 auto;padding:28px 32px 64px;display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start\">\n\n      <!-- conversation -->\n      <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-height:640px\">\n        <div style=\"padding:22px 28px;border-bottom:1px solid #ece3d4;display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#9c9079;margin-bottom:5px\">Section {{ assessment.sectionNum }} of {{ assessment.total }}<\u002Fdiv>\n            <div style=\"font-family:Spectral,serif;font-weight:600;font-size:21px;color:#2a2620\">{{ assessment.sectionTitle }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vx-accent,#b0542c)\">{{ assessment.timeLeft }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:6px 28px 0\">\n          <div style=\"height:4px;background:#ece3d4;border-radius:3px;overflow:hidden;margin:16px 0 6px\">\n            <div style=\"height:100%;width:{{ assessment.progressPct }}%;background:var(--vx-accent,#b0542c)\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:18px 28px 8px;display:flex;flex-direction:column;gap:22px;flex:1\">\n          <sc-for list=\"{{ assessment.messages }}\" as=\"m\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;gap:14px;align-items:flex-start\">\n              <div style=\"width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;background:#ece3d4;color:#8a7f6d\">{{ m.name }}<\u002Fdiv>\n              <div style=\"flex:1\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#a89a83;margin-bottom:6px\">{{ m.name }}<\u002Fdiv>\n                <div style=\"font-family:'Public Sans';font-size:15px;line-height:1.62;color:#3a352d\">{{ m.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"padding:18px 28px 22px;border-top:1px solid #ece3d4\">\n          <div style=\"display:flex;gap:12px;align-items:flex-end;background:#f4efe5;border:1px solid #e3d9c9;border-radius:6px;padding:12px 14px\">\n            <div style=\"flex:1;font-family:'Public Sans';font-size:14.5px;color:#a89a83;line-height:1.5;min-height:42px;padding-top:2px\">Type your response — the evaluator will follow up on what you say…<\u002Fdiv>\n            <button style=\"font-family:'Public Sans';font-weight:600;font-size:14px;color:#f7f2e9;background:var(--vx-accent,#b0542c);border:none;padding:10px 18px;border-radius:4px;cursor:pointer;flex:none\" style-hover=\"background:var(--vx-accent-deep,#8c4022)\">Send<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- signal sidebar -->\n      <aside style=\"display:flex;flex-direction:column;gap:18px;position:sticky;top:64px\">\n        <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:8px;padding:22px 22px 24px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#9c9079;margin-bottom:6px\">Live signal<\u002Fdiv>\n          <p style=\"font-family:'Public Sans';font-size:13px;line-height:1.5;color:#6f665a;margin:0 0 18px\">Dimensions this section is gathering evidence on.<\u002Fp>\n          <sc-for list=\"{{ assessment.signals }}\" as=\"sig\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:16px\">\n              <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\">\n                <span style=\"font-family:'Public Sans';font-weight:500;font-size:13.5px;color:#2a2620\">{{ sig.dim }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9c9079\">{{ sig.pct }}%<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:5px;background:#ece3d4;border-radius:3px;overflow:hidden\">\n                <div style=\"height:100%;width:{{ sig.pct }}%;background:var(--vx-accent,#b0542c)\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#efe7d8;border:1px solid #e3d9c9;border-radius:8px;padding:20px 22px\">\n          <div style=\"font-family:Spectral,serif;font-style:italic;font-size:15px;color:#2a2620;line-height:1.5;margin-bottom:10px\">There are no wrong answers here.<\u002Fdiv>\n          <p style=\"font-family:'Public Sans';font-size:13px;line-height:1.55;color:#6f665a;margin:0\">The evaluator is gathering signal on how you think, not checking for a correct response. Be specific and use real examples.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============================ RESULTS ============================ -->\n  <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <div style=\"max-width:1200px;margin:0 auto;padding:36px 32px 80px\">\n\n      <!-- profile header -->\n      <div style=\"background:#22201b;color:#ede4d3;border-radius:10px;padding:32px 36px;display:flex;align-items:center;gap:28px;flex-wrap:wrap\">\n        <div style=\"width:74px;height:74px;border-radius:50%;background:var(--vx-accent,#b0542c);color:#f7f2e9;display:flex;align-items:center;justify-content:center;font-family:Spectral,serif;font-weight:600;font-size:28px;flex:none\">{{ results.initials }}<\u002Fdiv>\n        <div style=\"flex:1;min-width:200px\">\n          <div style=\"font-family:Spectral,serif;font-weight:600;font-size:27px;color:#f3ead9;line-height:1.1\">{{ results.name }}<\u002Fdiv>\n          <div style=\"font-family:'Public Sans';font-size:14.5px;color:#bdb29d;margin-top:5px\">{{ results.role }} · {{ results.org }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:32px;flex-wrap:wrap\">\n          <div style=\"text-align:right\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;justify-content:flex-end\">\n              <span style=\"font-family:Spectral,serif;font-weight:600;font-size:52px;line-height:1;color:#f3ead9\">{{ results.overall }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8a7f6d\">/ 10<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#bdb29d;margin-top:4px\">Overall index<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:8px 16px;border:1px solid #4a4339;border-radius:40px;display:flex;align-items:center;gap:9px\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:{{ results.tierColor }};flex:none\"><\u002Fspan>\n            <span style=\"font-family:'Public Sans';font-weight:600;font-size:14px;color:#f3ead9\">{{ results.tierName }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:420px 1fr;gap:28px;margin-top:28px;align-items:start\">\n        <!-- radar -->\n        <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:10px;padding:26px 26px 24px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#9c9079;margin-bottom:6px\">Your competency shape<\u002Fdiv>\n          <svg viewBox=\"0 0 380 380\" width=\"100%\" style=\"display:block;margin:8px 0 4px;overflow:visible\">\n            <sc-for list=\"{{ radar.rings }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <polygon points=\"{{ r.pts }}\" fill=\"none\" stroke=\"#e8dfce\" stroke-width=\"1\"><\u002Fpolygon>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ radar.axes }}\" as=\"a\" hint-placeholder-count=\"6\">\n              <line x1=\"190\" y1=\"190\" x2=\"{{ a.x }}\" y2=\"{{ a.y }}\" stroke=\"#e8dfce\" stroke-width=\"1\"><\u002Fline>\n            <\u002Fsc-for>\n            <polygon points=\"{{ radar.valuePts }}\" fill=\"var(--vx-accent-fill,rgba(176,84,44,0.13))\" stroke=\"var(--vx-accent,#b0542c)\" stroke-width=\"2\"><\u002Fpolygon>\n            <sc-for list=\"{{ radar.valueDots }}\" as=\"d\" hint-placeholder-count=\"6\">\n              <circle cx=\"{{ d.x }}\" cy=\"{{ d.y }}\" r=\"3.6\" fill=\"var(--vx-accent,#b0542c)\"><\u002Fcircle>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ radar.labels }}\" as=\"l\" hint-placeholder-count=\"6\">\n              <text x=\"{{ l.x }}\" y=\"{{ l.y }}\" font-size=\"11\" fill=\"#8a7f6d\" text-anchor=\"{{ l.anchor }}\" font-family=\"'IBM Plex Mono',monospace\">{{ l.short }}<\u002Ftext>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <!-- dimension breakdown -->\n        <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:10px;padding:26px 28px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#9c9079;margin-bottom:20px\">Dimension breakdown<\u002Fdiv>\n          <sc-for list=\"{{ results.dims }}\" as=\"rd\" hint-placeholder-count=\"6\">\n            <div style=\"margin-bottom:20px\">\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px\">\n                <span style=\"font-family:'Public Sans';font-weight:600;font-size:14.5px;color:#2a2620\">{{ rd.title }}<\u002Fspan>\n                <span style=\"display:flex;align-items:baseline;gap:10px\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:{{ rd.color }}\">{{ rd.tier }}<\u002Fspan>\n                  <span style=\"font-family:Spectral,serif;font-weight:600;font-size:18px;color:#2a2620\">{{ rd.score }}<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:7px;background:#ece3d4;border-radius:4px;overflow:hidden\">\n                <div style=\"height:100%;width:{{ rd.barPct }}%;background:{{ rd.color }}\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- strengths & growth -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:28px\">\n        <div style=\"background:#efe7d8;border:1px solid #e3d9c9;border-radius:10px;padding:26px 28px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#7c3c1e;margin-bottom:16px\">Where you're strong<\u002Fdiv>\n          <sc-for list=\"{{ results.strengths }}\" as=\"s\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;gap:12px;align-items:center;padding:12px 0;border-top:1px solid #e0d4c0\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:#7c3c1e;flex:none\"><\u002Fspan>\n              <span style=\"font-family:'Public Sans';font-size:15px;color:#2a2620\">{{ s }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#efe7d8;border:1px solid #e3d9c9;border-radius:10px;padding:26px 28px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#c08a52;margin-bottom:16px\">Where to grow next<\u002Fdiv>\n          <sc-for list=\"{{ results.growth }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;gap:12px;align-items:center;padding:12px 0;border-top:1px solid #e0d4c0\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:#c08a52;flex:none\"><\u002Fspan>\n              <span style=\"font-family:'Public Sans';font-size:15px;color:#2a2620\">{{ g }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- development plan -->\n      <div style=\"margin-top:48px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:14px\">Your development plan<\u002Fdiv>\n        <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:32px;line-height:1.14;color:#22201b;margin:0 0 28px;max-width:620px\">Built from your gaps — not a generic curriculum.<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ results.plan }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:8px;padding:24px 26px;display:flex;gap:24px;align-items:flex-start\" style-hover=\"border-color:var(--vx-accent,#b0542c)\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--vx-accent,#b0542c);padding-top:3px\">{{ p.n }}<\u002Fdiv>\n              <div style=\"flex:1\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:#fff;background:{{ p.dimColor }};padding:3px 9px;border-radius:20px\">{{ p.dim }}<\u002Fspan>\n                <\u002Fdiv>\n                <h3 style=\"font-family:Spectral,serif;font-weight:600;font-size:20px;color:#2a2620;margin:0 0 7px\">{{ p.title }}<\u002Fh3>\n                <p style=\"font-family:'Public Sans';font-size:14.5px;line-height:1.6;color:#6f665a;margin:0\">{{ p.desc }}<\u002Fp>\n              <\u002Fdiv>\n              <button style=\"font-family:'Public Sans';font-weight:600;font-size:13.5px;color:#2a2620;background:transparent;border:1px solid #cdc2af;padding:9px 16px;border-radius:4px;cursor:pointer;flex:none\" style-hover=\"border-color:#2a2620\">Begin<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============================ LEADERBOARD ============================ -->\n  <sc-if value=\"{{ isLeaderboard }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <div style=\"max-width:1100px;margin:0 auto;padding:56px 32px 80px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:16px\">The index<\u002Fdiv>\n      <h1 style=\"font-family:Spectral,serif;font-weight:600;font-size:46px;line-height:1.08;letter-spacing:-0.014em;color:#22201b;margin:0 0 14px;max-width:680px\">The leaders setting the standard for the field.<\u002Fh1>\n      <p style=\"font-family:'Public Sans';font-size:17px;line-height:1.6;color:#6f665a;margin:0 0 36px;max-width:560px\">Coordinators, program managers, and directors — verified by assessment, not self-report. Click any profile to see their full competency shape.<\u002Fp>\n\n      <div style=\"display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap\">\n        <div style=\"font-family:'Public Sans';font-weight:600;font-size:13px;color:#f7f2e9;background:var(--vx-accent,#b0542c);padding:8px 16px;border-radius:40px\">All tiers<\u002Fdiv>\n        <div style=\"font-family:'Public Sans';font-size:13px;color:#6f665a;background:#fcfaf5;border:1px solid #e3d9c9;padding:8px 16px;border-radius:40px\">All dimensions<\u002Fdiv>\n        <div style=\"font-family:'Public Sans';font-size:13px;color:#6f665a;background:#fcfaf5;border:1px solid #e3d9c9;padding:8px 16px;border-radius:40px\">All regions<\u002Fdiv>\n        <div style=\"font-family:'Public Sans';font-size:13px;color:#6f665a;background:#fcfaf5;border:1px solid #e3d9c9;padding:8px 16px;border-radius:40px\">Coordinators<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:10px;overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:54px 1fr 150px 130px 80px;gap:16px;padding:14px 24px;border-bottom:1px solid #ece3d4;background:#efe7d8\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#9c9079\">Rank<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#9c9079\">Leader<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#9c9079\">Top dimension<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#9c9079\">Tier<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#9c9079;text-align:right\">Index<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ leaders }}\" as=\"ld\" hint-placeholder-count=\"8\">\n          <div onclick=\"{{ go.results }}\" style=\"display:grid;grid-template-columns:54px 1fr 150px 130px 80px;gap:16px;padding:18px 24px;border-bottom:1px solid #ece3d4;align-items:center;cursor:pointer\" style-hover=\"background:#f7f1e7\">\n            <div style=\"{{ ld.rankStyle }}\">{{ ld.rank }}<\u002Fdiv>\n            <div>\n              <div style=\"font-family:Spectral,serif;font-weight:600;font-size:17px;color:#2a2620\">{{ ld.name }}<\u002Fdiv>\n              <div style=\"font-family:'Public Sans';font-size:13px;color:#8a7f6d;margin-top:2px\">{{ ld.role }} · {{ ld.org }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'Public Sans';font-size:13.5px;color:#6f665a\">{{ ld.top }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:{{ ld.tierColor }};flex:none\"><\u002Fspan>\n              <span style=\"font-family:'Public Sans';font-size:13.5px;color:#2a2620\">{{ ld.tier }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:Spectral,serif;font-weight:600;font-size:22px;color:#2a2620;text-align:right\">{{ ld.score }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:40px;background:#22201b;border-radius:10px;padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap\">\n        <div>\n          <h3 style=\"font-family:Spectral,serif;font-weight:600;font-size:26px;color:#f3ead9;margin:0 0 8px\">Earn your place on the index.<\u002Fh3>\n          <p style=\"font-family:'Public Sans';font-size:15px;color:#bdb29d;margin:0\">Take the assessment and choose to list your verified score publicly.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ go.assessment }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:15.5px;color:#f7f2e9;background:var(--vx-accent,#b0542c);border:none;padding:15px 28px;border-radius:2px;cursor:pointer;flex:none\" style-hover=\"background:var(--vx-accent-deep,#8c4022)\">Start your assessment<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============================ PRICING ============================ -->\n  <sc-if value=\"{{ isPricing }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <div style=\"max-width:1200px;margin:0 auto;padding:56px 32px 40px;text-align:center\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--vx-accent,#b0542c);margin-bottom:16px\">Pricing<\u002Fdiv>\n      <h1 style=\"font-family:Spectral,serif;font-weight:600;font-size:46px;line-height:1.08;letter-spacing:-0.014em;color:#22201b;margin:0 0 14px\">One credit. One full evaluation.<\u002Fh1>\n      <p style=\"font-family:'Public Sans';font-size:17px;line-height:1.6;color:#6f665a;margin:0 auto;max-width:520px\">A credit unlocks the conversational assessment, your six-dimension score, and a development plan built from your results.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"max-width:1200px;margin:0 auto;padding:24px 32px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:stretch\">\n      <sc-for list=\"{{ pricing }}\" as=\"pl\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fcfaf5;border:1px solid #e3d9c9;border-radius:10px;padding:32px 30px 30px;display:flex;flex-direction:column\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#9c9079;margin-bottom:14px\">{{ pl.credits }}<\u002Fdiv>\n          <h3 style=\"font-family:Spectral,serif;font-weight:600;font-size:24px;color:#2a2620;margin:0 0 8px\">{{ pl.name }}<\u002Fh3>\n          <p style=\"font-family:'Public Sans';font-size:14px;line-height:1.5;color:#6f665a;margin:0 0 22px;min-height:42px\">{{ pl.desc }}<\u002Fp>\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #ece3d4\">\n            <span style=\"font-family:Spectral,serif;font-weight:600;font-size:44px;line-height:1;color:#22201b\">{{ pl.price }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9c9079\">{{ pl.unit }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px;flex:1;margin-bottom:26px\">\n            <sc-for list=\"{{ pl.features }}\" as=\"f\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" style=\"flex:none;margin-top:2px\"><path d=\"M3 8.5L6.2 11.5L13 4.5\" fill=\"none\" stroke=\"var(--vx-accent,#b0542c)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-family:'Public Sans';font-size:14px;line-height:1.45;color:#3a352d\">{{ f }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ pl.ctaGo }}\" style=\"font-family:'Public Sans';font-weight:600;font-size:15px;padding:14px;border-radius:4px;cursor:pointer;width:100%;border:1px solid var(--vx-accent,#b0542c);background:var(--vx-accent,#b0542c);color:#f7f2e9\" style-hover=\"background:var(--vx-accent-deep,#8c4022)\">{{ pl.cta }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- featured highlight note -->\n    <div style=\"max-width:1200px;margin:0 auto;padding:8px 32px 0;text-align:center\">\n      <span style=\"font-family:'Public Sans';font-size:13.5px;color:#8a7f6d\">Growth Track is the smart start — one for now, one for your first level-up, one to spare.<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- every assessment includes -->\n    <div style=\"max-width:1200px;margin:0 auto;padding:64px 32px\">\n      <div style=\"background:#efe7d8;border:1px solid #e3d9c9;border-radius:12px;padding:40px 44px\">\n        <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:28px;color:#22201b;margin:0 0 28px;text-align:center\">Every assessment includes<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px 36px\">\n          <sc-for list=\"{{ includeFeatures }}\" as=\"inc\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 16 16\" style=\"flex:none;margin-top:2px\"><path d=\"M3 8.5L6.2 11.5L13 4.5\" fill=\"none\" stroke=\"var(--vx-accent,#b0542c)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-family:'Public Sans';font-size:15px;line-height:1.45;color:#2a2620\">{{ inc }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FAQ -->\n    <div style=\"max-width:840px;margin:0 auto;padding:0 32px 80px\">\n      <h2 style=\"font-family:Spectral,serif;font-weight:600;font-size:30px;color:#22201b;margin:0 0 28px;text-align:center\">Common questions<\u002Fh2>\n      <sc-for list=\"{{ faqs }}\" as=\"fq\" hint-placeholder-count=\"4\">\n        <div style=\"border-top:1px solid #e3d9c9;padding:24px 4px\">\n          <h3 style=\"font-family:'Public Sans';font-weight:600;font-size:17px;color:#2a2620;margin:0 0 9px\">{{ fq.q }}<\u002Fh3>\n          <p style=\"font-family:'Public Sans';font-size:15px;line-height:1.6;color:#6f665a;margin:0\">{{ fq.a }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============================ FOOTER ============================ -->\n  <sc-if value=\"{{ showFooter }}\" hint-placeholder-val=\"{{ true }}\">\n  <footer style=\"background:#1c1a16;color:#bdb29d;border-top:1px solid #3a352d\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:52px 32px 40px\">\n      <div style=\"display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;padding-bottom:36px;border-bottom:1px solid #2f2b24\">\n        <div style=\"max-width:340px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n            <svg width=\"26\" height=\"23\" viewBox=\"0 0 30 26\" style=\"display:block\" fill=\"none\">\n              <path d=\"M2 21 A13 13 0 0 1 28 21\" stroke=\"#efe2cd\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M6.5 21 A8.5 8.5 0 0 1 23.5 21\" stroke=\"#d99a5f\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M11 21 A4 4 0 0 1 19 21\" stroke=\"#c66236\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n              <circle cx=\"15\" cy=\"21\" r=\"2.2\" fill=\"#c66236\"><\u002Fcircle>\n            <\u002Fsvg>\n            <span style=\"font-family:Spectral,serif;font-weight:600;font-size:19px;color:#ede4d3\">Volo Index<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:'Public Sans';font-size:14px;line-height:1.6;color:#8a7f6d;margin:0\">A competency index for volunteer leadership grounded decades of research<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:64px;flex-wrap:wrap\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6b6354;margin-bottom:14px\">Product<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <button onclick=\"{{ go.home }}\" style=\"font-family:'Public Sans';font-size:14px;color:#bdb29d;background:none;border:none;cursor:pointer;padding:0;text-align:left\" style-hover=\"color:#ede4d3\">How it works<\u002Fbutton>\n              <button onclick=\"{{ go.leaderboard }}\" style=\"font-family:'Public Sans';font-size:14px;color:#bdb29d;background:none;border:none;cursor:pointer;padding:0;text-align:left\" style-hover=\"color:#ede4d3\">Leaderboard<\u002Fbutton>\n              <button onclick=\"{{ go.pricing }}\" style=\"font-family:'Public Sans';font-size:14px;color:#bdb29d;background:none;border:none;cursor:pointer;padding:0;text-align:left\" style-hover=\"color:#ede4d3\">Pricing<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6b6354;margin-bottom:14px\">The framework<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <button onclick=\"{{ go.home }}\" style=\"font-family:'Public Sans';font-size:14px;color:#bdb29d;background:none;border:none;cursor:pointer;padding:0;text-align:left\" style-hover=\"color:#ede4d3\">Six dimensions<\u002Fbutton>\n              <button onclick=\"{{ go.home }}\" style=\"font-family:'Public Sans';font-size:14px;color:#bdb29d;background:none;border:none;cursor:pointer;padding:0;text-align:left\" style-hover=\"color:#ede4d3\">Scoring scale<\u002Fbutton>\n              <button onclick=\"{{ go.results }}\" style=\"font-family:'Public Sans';font-size:14px;color:#bdb29d;background:none;border:none;cursor:pointer;padding:0;text-align:left\" style-hover=\"color:#ede4d3\">Sample profile<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;padding-top:24px\">\n        <a href=\"https://gpfnd.org\" target=\"_blank\" style=\"font-family:'Public Sans';font-size:13.5px;color:#8a7f6d;text-decoration:none;display:flex;align-items:center;gap:8px\" style-hover=\"color:#ede4d3\">Made by the <span style=\"color:#bdb29d;font-weight:600\">Give Protocol Foundation<\u002Fspan> — open infrastructure for transparent philanthropy.<\u002Fa>\n        \n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Clay&quot;,&quot;Forest&quot;,&quot;Slate&quot;,&quot;Plum&quot;],&quot;default&quot;:&quot;Forest&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;heroVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Individuals&quot;,&quot;Organizations&quot;],&quot;default&quot;:&quot;Individuals&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Home&quot;,&quot;Assessment&quot;,&quot;Results&quot;,&quot;Leaderboard&quot;,&quot;Pricing&quot;],&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'home' };\n\n  componentDidMount() {\n    const map = { Home:'home', Assessment:'assessment', Results:'results', Leaderboard:'leaderboard', Pricing:'pricing' };\n    const ds = this.props.defaultScreen;\n    if (ds && map[ds] && map[ds] !== this.state.screen) this.setState({ screen: map[ds] });\n    this.applyTheme();\n  }\n  componentDidUpdate() { this.applyTheme(); }\n\n  applyTheme() {\n    const themes = {\n      Clay:   { a:'#b0542c', d:'#8c4022', f:'rgba(176,84,44,0.13)' },\n      Forest: { a:'#44704f', d:'#2f5238', f:'rgba(68,112,79,0.13)' },\n      Slate:  { a:'#3f5a72', d:'#2b4150', f:'rgba(63,90,114,0.13)' },\n      Plum:   { a:'#7a4361', d:'#5a2f48', f:'rgba(122,67,97,0.13)' },\n    };\n    const t = themes[this.props.accentTheme] || themes.Clay;\n    if (this._root) {\n      this._root.style.setProperty('--vx-accent', t.a);\n      this._root.style.setProperty('--vx-accent-deep', t.d);\n      this._root.style.setProperty('--vx-accent-fill', t.f);\n    }\n  }\n\n  tierFor(score) {\n    if (score <= 3.0) return { name:'Foundational', color:'#cdb392' };\n    if (score <= 5.5) return { name:'Developing',   color:'#c08a52' };\n    if (score <= 7.5) return { name:'Proficient',   color:'#a8602f' };\n    return { name:'Expert', color:'#7c3c1e' };\n  }\n\n  computeRadar(scores, labelsShort) {\n    const cx = 190, cy = 190, maxR = 140, N = scores.length;\n    const ang = i => (-90 + i * (360 / N)) * Math.PI / 180;\n    const pt = (i, r) => [cx + r * Math.cos(ang(i)), cy + r * Math.sin(ang(i))];\n    const fmt = p => p.map(v => v.toFixed(1)).join(',');\n    const rings = [2,4,6,8,10].map(level => {\n      const r = maxR * level / 10;\n      return { pts: scores.map((_, i) => fmt(pt(i, r))).join(' ') };\n    });\n    const axes = scores.map((_, i) => { const [x,y] = pt(i, maxR); return { x:x.toFixed(1), y:y.toFixed(1) }; });\n    const valuePts = scores.map((s, i) => fmt(pt(i, maxR * s / 10))).join(' ');\n    const valueDots = scores.map((s, i) => { const [x,y] = pt(i, maxR * s / 10); return { x:x.toFixed(1), y:y.toFixed(1) }; });\n    const labels = scores.map((s, i) => {\n      const [x,y] = pt(i, maxR + 22);\n      const anchor = Math.abs(x - cx) < 3 ? 'middle' : (x > cx ? 'start' : 'end');\n      return { x:x.toFixed(1), y:(y + 4).toFixed(1), anchor, short: labelsShort[i] };\n    });\n    return { rings, axes, valuePts, valueDots, labels };\n  }\n\n  renderVals() {\n    const go = {\n      home:        () => this.setState({ screen:'home' }),\n      assessment:  () => this.setState({ screen:'assessment' }),\n      results:     () => this.setState({ screen:'results' }),\n      leaderboard: () => this.setState({ screen:'leaderboard' }),\n      pricing:     () => this.setState({ screen:'pricing' }),\n    };\n    const cur = this.state.screen;\n    const tab = (active) => 'font-family:\\'IBM Plex Mono\\',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;border:none;cursor:pointer;padding:6px 12px;border-radius:2px;'\n      + (active\n        ? 'background:var(--vx-accent,#b0542c);color:#f7f2e9;'\n        : 'background:transparent;color:#9c9079;');\n    const screenDefs = [\n      ['home','Home'],['assessment','Assessment'],['results','Results'],['leaderboard','Leaderboard'],['pricing','Pricing'],\n    ];\n    const screens = screenDefs.map(([k,l]) => ({ label:l, go:go[k], tabStyle: tab(cur === k) }));\n\n    const SHORT = ['Strategy','Recruitment','Training','Performance','Retention','Ethics'];\n    const dims = [\n      { n:'01', short:'Strategy',    title:'Strategic Engagement Design',        desc:'Connects volunteer engagement to mission and strategy — org readiness, where volunteers create genuine value, and the internal case for investing in the function.' },\n      { n:'02', short:'Recruitment', title:'Recruitment, Matching & Onboarding',  desc:'Attracts the right volunteers, matches them to roles that fit their motivations and skills, and integrates them in a way that sets up long-term success.' },\n      { n:'03', short:'Training',    title:'Training, Development & Role Support', desc:'Prepares volunteers and supports ongoing growth without the leverage of a paycheck — orientation, coaching, and pathways that keep people engaged.' },\n      { n:'04', short:'Performance', title:'Performance, Impact & Accountability', desc:'Manages performance, measures impact, and holds accountability within the unique constraints of an unpaid relationship.' },\n      { n:'05', short:'Retention',   title:'Recognition, Retention & Culture',    desc:'Sustains commitment through motivation-matched recognition, strong retention practice, and a culture of belonging across staff and volunteers.' },\n      { n:'06', short:'Ethics',      title:'Ethics, Equity & Advocacy',           desc:'Navigates power dynamics, ensures equitable access, protects data, and advocates for the volunteer function and its resources.' },\n    ];\n\n    const tierScale = [\n      { name:'Foundational', range:'1.0 – 3.0',  color:'#cdb392', desc:'Basic awareness; instinct-driven; conflates volunteer and employee management.' },\n      { name:'Developing',   range:'3.1 – 5.5',  color:'#c08a52', desc:'Understands the principles but applies them inconsistently; reactive rather than intentional.' },\n      { name:'Proficient',   range:'5.6 – 7.5',  color:'#a8602f', desc:'Consistent, intentional practice; can articulate reasoning and adapt to context.' },\n      { name:'Expert',       range:'7.6 – 10.0', color:'#7c3c1e', desc:'Evaluates systems, designs programs, advocates strategically, and mentors others.' },\n    ];\n\n    const audience = [\n      { tier:'Tier 1', who:'Frontline volunteers',     focus:'Direct service and foundational competency expectations.' },\n      { tier:'Tier 2', who:'Volunteer coordinators',   focus:'Day-to-day management and operational proficiency.' },\n      { tier:'Tier 3', who:'Program managers',         focus:'Cross-team oversight and developing strategic framing.' },\n      { tier:'Tier 4', who:'Directors & executives',   focus:'Org-level design, advocacy, culture, and infrastructure.' },\n    ];\n\n    const pricing = [\n      { name:'Single Assessment', credits:'1 credit', price:'$39', unit:'one evaluation', featured:false,\n        desc:'Find out exactly where you stand today.',\n        features:['Full six-section conversational evaluation','1–10 developmental scoring','Radar profile of your competency shape','Personalized development plan','Shareable certified profile'],\n        cta:'Start your assessment', ctaGo: go.assessment },\n      { name:'Growth Track', credits:'3 credits', price:'$99', unit:'$33 / assessment', featured:true,\n        desc:'Measure, level up, and prove the change over time.',\n        features:['Everything in Single, three times over','Re-assess to track progress over months','Side-by-side score comparison','Eligible for the public leaderboard','Priority access to new dimensions'],\n        cta:'Choose Growth Track', ctaGo: go.assessment },\n      { name:'For Organizations', credits:'Custom', price:'Custom', unit:'volume pricing', featured:false,\n        desc:'Credential and benchmark your whole volunteer program.',\n        features:['Team dashboard across all leaders','Cohort and role-level benchmarking','Bulk credits and seat management','Aggregate competency reporting','Onboarding and rollout support'],\n        cta:'Talk to us', ctaGo: go.assessment },\n    ];\n\n    const leaderRows = [\n      { rank:1, name:'Maren Okafor',     role:'Director of Volunteer Programs', org:'Riverbend Community Trust',  score:8.9, top:'Retention' },\n      { rank:2, name:'Daniel Reyes',     role:'Volunteer Program Manager',      org:'City Harvest Network',       score:8.4, top:'Strategy' },\n      { rank:3, name:'Priya Anand',      role:'Coordinator of Volunteers',      org:'Lantern House',              score:7.9, top:'Ethics' },\n      { rank:4, name:'Thomas Bauer',     role:'Director of Engagement',         org:'Greenline Conservancy',      score:7.4, top:'Performance' },\n      { rank:5, name:'Aisha Mbeki',      role:'Volunteer Coordinator',          org:'Mercy Shelter Coalition',    score:7.1, top:'Training' },\n      { rank:6, name:'Grace Lin',        role:'Program Manager',                org:'Stepping Stones Youth',      score:6.8, top:'Recruitment' },\n      { rank:7, name:'Owen Walsh',       role:'Engagement Lead',                org:'Harbor Light Mission',       score:6.5, top:'Retention' },\n      { rank:8, name:'Sofia Marchetti',  role:'Volunteer Coordinator',          org:'Open Table Kitchen',         score:5.4, top:'Recruitment' },\n    ];\n    const leaders = leaderRows.map(l => {\n      const t = this.tierFor(l.score);\n      const isTop = l.rank <= 3;\n      return Object.assign({}, l, {\n        tier: t.name, tierColor: t.color,\n        rankStyle: 'width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:\\'IBM Plex Mono\\',monospace;font-size:13px;font-weight:600;flex:none;'\n          + (isTop ? 'background:var(--vx-accent,#b0542c);color:#f7f2e9;' : 'background:#ece3d4;color:#8a7f6d;'),\n      });\n    });\n\n    const rScores = [7.2, 6.4, 5.1, 4.3, 7.8, 6.0];\n    const overall = +(rScores.reduce((a,b)=>a+b,0)/rScores.length).toFixed(1);\n    const oTier = this.tierFor(overall);\n    const rDims = dims.map((d, i) => {\n      const t = this.tierFor(rScores[i]);\n      return { short:d.short, title:d.title, score:rScores[i].toFixed(1), tier:t.name, color:t.color, barPct:(rScores[i]*10).toFixed(0) };\n    });\n    const results = {\n      name:'Jordan Avery', initials:'JA', role:'Volunteer Coordinator', org:'Mercy Shelter Coalition', date:'June 2026',\n      overall: overall.toFixed(1), tierName: oTier.name, tierColor: oTier.color, tierRange:'5.6 – 7.5',\n      dims: rDims,\n      strengths:['Recognition, Retention & Culture','Strategic Engagement Design'],\n      growth:['Performance, Impact & Accountability','Training, Development & Role Support'],\n      plan:[\n        { n:'01', dim:'Performance', dimColor:'#c08a52', title:'Build an impact-measurement baseline', desc:'Define three outcome indicators for one volunteer role and begin collecting them this quarter — the smallest credible version of measurement.' },\n        { n:'02', dim:'Training',    dimColor:'#c08a52', title:'From handbook to coaching cadence', desc:'Replace one-time orientation with a structured 30/60/90 coaching rhythm so support outlasts the first week.' },\n        { n:'03', dim:'Ethics',     dimColor:'#a8602f', title:'Design for equitable access', desc:'Audit one program for participation barriers and redesign the entry pathway so more of your community can take part.' },\n        { n:'04', dim:'Recruitment', dimColor:'#a8602f', title:'Match on motivation, not availability', desc:'Bring the Volunteer Functions Inventory into intake so roles are matched to what actually keeps people coming back.' },\n      ],\n    };\n\n    const radar = this.computeRadar(rScores, SHORT);\n\n    const assessment = {\n      sectionNum:'03', total:'06', sectionTitle:'Training, Development & Role Support',\n      progressPct:'46', timeLeft:'~12 min left',\n      messages:[\n        { isUser:false, name:'Evaluator', text:'Let\\u2019s talk about how you prepare volunteers for real responsibility. Think about the last person you onboarded into a role that mattered. Walk me through what that actually looked like \\u2014 not the ideal version, the real one.' },\n        { isUser:true,  name:'You', text:'We had a new hospice visitor join. I paired her with an experienced volunteer for three shifts, handed her our handbook, and we debriefed after each visit. Honestly the shadowing did far more than the handbook.' },\n        { isUser:false, name:'Evaluator', text:'That instinct \\u2014 weighting the shadowing over the handbook \\u2014 is interesting. What was she picking up in those shifts that the handbook couldn\\u2019t give her?' },\n        { isUser:true,  name:'You', text:'How to sit with silence. When to step back. The emotional pacing of a visit. None of that really lives on paper.' },\n        { isUser:false, name:'Evaluator', text:'So you recognized tacit knowledge and built a transfer mechanism for it. Last one on this: after those three shifts, how did you know she was actually ready \\u2014 and what would you have done if she wasn\\u2019t?' },\n      ],\n      signals:[\n        { dim:'Training',    pct:82 },\n        { dim:'Performance', pct:48 },\n        { dim:'Ethics',      pct:34 },\n      ],\n    };\n\n    const includeFeatures = [\n      'Six-dimension conversational evaluation',
